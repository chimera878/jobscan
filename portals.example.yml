# portals.example.yml — Job Scanner Configuration Template
# Copy this file to portals.yml and fill in your details.
# Run /jobscan init to have Claude configure everything interactively.
#
# Sources supported:
#   1. ATS APIs  — Greenhouse, Ashby, Lever (tracked_companies below)
#   2. Adzuna    — multi-region job aggregator API (free key, supports 18 countries)
#   3. AI Jobs   — aijobs.net HTML scraper (no key required)
#   4. Reed UK   — direct REST API (free key from reed.co.uk/developers)

# ── Freshness ────────────────────────────────────────────────────────
max_age_days: 1          # jobs older than this are ignored at scan time

# ── Evaluation ───────────────────────────────────────────────────────
score_threshold: 3.5     # jobs scoring below this are auto-archived in pipeline.md

# ── Adzuna ───────────────────────────────────────────────────────────
# Free API key from: https://developer.adzuna.com
adzuna:
  app_id: "YOUR_ADZUNA_APP_ID"
  app_key: "YOUR_ADZUNA_APP_KEY"

# ── Location ─────────────────────────────────────────────────────────
# A job passes if its location matches any allow keyword OR has no location.
# Block takes priority over allow.
location_filter:
  allow:
    - UK
    - United Kingdom
    - London
    - Remote
  block:
    - United States
    - ", US"
    - Germany

# ── Seniority ────────────────────────────────────────────────────────
# Hard title filter — applied at scan time, no Claude tokens used.
# A job is rejected if its title contains any exclude keyword.
seniority_filter:
  exclude:
    - Senior
    - "Sr."
    - "Sr "
    - Lead
    - Staff
    - Principal
    - Manager
    - Director
    - "VP "
    - Vice President
    - Head of
    - Chief

# ── Domain exclusions ─────────────────────────────────────────────────
# Hard title filter — role types to exclude entirely.
domain_filter:
  exclude:
    - Frontend
    - "Front-end"
    - "Full Stack"
    - "Full-stack"
    - Embedded
    - Firmware
    - iOS
    - Android

# ── Role keywords ─────────────────────────────────────────────────────
# Hard title filter — at least one positive keyword must appear in the job title.
# Keep broad — seniority and domain filters do the narrowing above.
keyword_filter:
  positive:
    - Software Engineer
    - Machine Learning
    - Data Engineer
    - AI Engineer
    - Research Engineer

# ── Tech stack ────────────────────────────────────────────────────────
# Used by Claude during /jobscan eval — NOT a title filter.
# positive: skills you have (boost score when matched in JD)
# negative: skills you lack (penalise score if listed as essential in JD)
tech_stack:
  positive:
    - Python
    - SQL
  negative:
    - React
    - TypeScript

# ── Reed API ─────────────────────────────────────────────────────────
# Free key from: https://www.reed.co.uk/developers/Jobseeker
reed_api_key: "YOUR_REED_API_KEY"

reed_queries:
  - query: "software engineer"
    location: "United Kingdom"
    enabled: true
  - query: "machine learning engineer"
    location: "United Kingdom"
    enabled: true

# ── Adzuna queries ────────────────────────────────────────────────────
# Queries run against the Adzuna API.
# Set location to your country name or code (e.g. "UK", "United States", "Germany").
# Supported: Australia, Austria, Belgium, Brazil, Canada, France, Germany, India,
# Italy, Mexico, Netherlands, New Zealand, Poland, Russia, Singapore, South Africa,
# United Kingdom, United States. Unsupported regions print a warning and are skipped.
adzuna_queries:
  - query: "software engineer"
    location: "UK"
    enabled: true
  - query: "machine learning engineer"
    location: "UK"
    enabled: true

# ── Greenhouse platform queries ───────────────────────────────────────
# WebSearch site: queries against job-boards.greenhouse.io — surfaces jobs from
# ANY company on Greenhouse, not just tracked ones. Run by /scan (token cost).
# Generated by /init Query Calibration. Edit manually if needed.
greenhouse_queries:
  - query: 'site:job-boards.greenhouse.io "Software Engineer" OR "Machine Learning Engineer" UK OR London OR Remote'
    enabled: true

# ── Ashby platform queries ────────────────────────────────────────────
ashby_queries:
  - query: 'site:jobs.ashbyhq.com "Software Engineer" OR "Machine Learning Engineer" UK OR London OR Remote'
    enabled: true

# ── Lever platform queries ────────────────────────────────────────────
# Note: jobs.lever.co may have reduced Google indexing. Set enabled: false if /scan
# returns zero Lever results.
lever_queries:
  - query: 'site:jobs.lever.co "Software Engineer" OR "Machine Learning Engineer" UK OR London OR Remote'
    enabled: true

# ── Tracked companies ─────────────────────────────────────────────────
# Monitor specific companies via their ATS API — zero tokens, always fresh.
# Supported: Greenhouse, Ashby, Lever. scan.mjs auto-detects from careers_url.
# Custom ATS companies (Google, Meta, Bloomberg, etc.) use scan_method: websearch —
# polled by /scan, not scan.mjs.

tracked_companies:
  - name: Example Company (Greenhouse)
    careers_url: https://job-boards.greenhouse.io/examplecompany
    enabled: true

  - name: Example Startup (Ashby)
    careers_url: https://jobs.ashbyhq.com/examplestartup
    enabled: true

  - name: Example Scaleup (Lever)
    careers_url: https://jobs.lever.co/examplescaleup
    enabled: true

  - name: Example Corp (custom ATS)
    careers_url: https://careers.example.com/jobs
    scan_method: websearch
    scan_query: 'site:careers.example.com "Software Engineer" OR "Machine Learning" UK OR London'
    enabled: true